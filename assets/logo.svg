<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="1024" height="1024">
  <!-- Background -->
  <rect x="0" y="0" width="100" height="100" rx="22" fill="#0F0F10"/>

  <!-- Clock face ring -->
  <circle cx="50" cy="46" r="26" stroke="#F59E0B" stroke-width="3" fill="none"/>

  <!-- Tick marks at 12, 3, 6, 9 -->
  <line x1="50" y1="22" x2="50" y2="26" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="74" y1="46" x2="70" y2="46" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="70" x2="50" y2="66" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="26" y1="46" x2="30" y2="46" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Minute hand (pointing to 12) -->
  <line x1="50" y1="46" x2="50" y2="27" stroke="#F59E0B" stroke-width="3" stroke-linecap="round"/>

  <!-- Hour hand (pointing to ~2) -->
  <line x1="50" y1="46" x2="63" y2="54" stroke="#F59E0B" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="50" cy="46" r="3" fill="#F59E0B"/>

  <!-- Log lines -->
  <rect x="26" y="81" width="16" height="3" rx="1.5" fill="#F59E0B"/>
  <rect x="26" y="87" width="48" height="3" rx="1.5" fill="#F59E0B" opacity="0.4"/>
  <rect x="26" y="93" width="34" height="3" rx="1.5" fill="#F59E0B" opacity="0.25"/>
</svg>
